<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 7: Events & Interactivity</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 30px; background-color: #f0f4f8; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        
        /* Activity 1: Box Style */
        #colorBox { 
            width: 100%; height: 100px; border: 2px dashed #3498db; 
            display: flex; align-items: center; justify-content: center; 
            margin: 15px 0; border-radius: 8px; transition: 0.3s; font-weight: bold;
        }

        .section { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid #eee; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 6px; border: none; background: #3498db; color: white; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; width: calc(100% - 120px); }
        .error { color: #e74c3c; font-size: 0.9em; margin-top: 5px; }
        .success { color: #27ae60; font-size: 0.9em; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Event Listeners 22/EG/CO/1741</h1>

    <div class="section">
        <h3>1. Mouse Events</h3>
        <div id="colorBox">Hover over me!</div>
    </div>

    <div class="section">
        <h3>2. Click Counter: <span id="countDisplay">0</span></h3>
        <button id="counterBtn">Click to Increment</button>
    </div>

    <div class="section">
        <h3>3. Form Validation</h3>
        <form id="emailForm">
            <input type="text" id="emailInput" placeholder="Enter your email">
            <button type="submit">Submit</button>
            <p id="feedback"></p>
        </form>
    </div>

    <div class="section">
        <h3>5. Prevent Default</h3>
        <a href="https://google.com" id="blockedLink">Try to visit Google</a>
    </div>

    <div class="section">
        <h3>4. Timer Status</h3>
        <p id="timerText">The magic happens in 5 seconds...</p>
    </div>
</div>

<script>
    // Activity 1: Mouseover and Mouseout
    const colorBox = document.getElementById("colorBox");
    colorBox.addEventListener("mouseover", function() {
        this.style.backgroundColor = "#f1c40f"; // Yellow
        this.innerText = "Mouse is over!";
    });
    colorBox.addEventListener("mouseout", function() {
        this.style.backgroundColor = "transparent";
        this.innerText = "Hover over me!";
    });

    // Activity 2: Simple Counter
    let count = 0;
    const counterBtn = document.getElementById("counterBtn");
    const countDisplay = document.getElementById("countDisplay");
    counterBtn.addEventListener("click", () => {
        count++;
        countDisplay.innerText = count;
    });

    // Activity 3 & 5: Form Validation and preventDefault()
    const emailForm = document.getElementById("emailForm");
    const emailInput = document.getElementById("emailInput");
    const feedback = document.getElementById("feedback");

    emailForm.addEventListener("submit", function(event) {
        // Prevents the page from refreshing on form submit
        event.preventDefault(); 
        
        if (emailInput.value.includes("@")) {
            feedback.innerText = "Success! Email is valid.";
            feedback.className = "success";
        } else {
            feedback.innerText = "Error: Invalid email (missing @).";
            feedback.className = "error";
        }
    });

    // Activity 5: Prevent Link Navigation
    document.getElementById("blockedLink").addEventListener("click", (event) => {
        event.preventDefault();
        alert("Wait! event.preventDefault() stopped you from leaving the page.");
    });

    // Activity 4: Timers (setTimeout)
    const timerText = document.getElementById("timerText");
    setTimeout(() => {
        timerText.innerText = "⏰ 5 seconds are up! Text changed.";
        timerText.style.color = "#3498db";
        timerText.style.fontWeight = "bold";
    }, 5000);
</script>

</body>
</html>
